name: Publish Package

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version and Publish
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          # Get latest published version from npm (returns empty if not published)
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          echo "Local version: $LOCAL_VERSION"
          echo "NPM version: $NPM_VERSION"

          # Compare and bump if needed
          if [ "$(npx semver "$LOCAL_VERSION" -r "<=$NPM_VERSION")" ]; then
            # Local version is <= npm version, need to bump
            NEW_VERSION=$(npx semver "$NPM_VERSION" -i patch)
            echo "Bumping to next available version: $NEW_VERSION"
            npm version "$NEW_VERSION" -m "chore: bump version to %s [skip ci]" --allow-same-version
          else
            echo "Local version $LOCAL_VERSION is ahead of npm, using it"
            npm version "$LOCAL_VERSION" -m "chore: bump version to %s [skip ci]" --allow-same-version
          fi

          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Version Bump
        run: |
          git push origin HEAD:master
          git push --tags
