name: Publish Package

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsup.config.ts'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  publish:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version and Publish
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          echo "Local version: $LOCAL_VERSION"
          echo "NPM version: $NPM_VERSION"

          # Pick a starting candidate: the higher of local or npm version
          if [ "$(npx semver "$LOCAL_VERSION" -r "<=$NPM_VERSION")" ]; then
            CANDIDATE=$(npx semver "$NPM_VERSION" -i patch)
          else
            CANDIDATE="$LOCAL_VERSION"
          fi

          # Keep incrementing until we find a version not yet published
          while npm view "$PACKAGE_NAME@$CANDIDATE" version 2>/dev/null | grep -q .; do
            echo "Version $CANDIDATE already published, incrementing..."
            CANDIDATE=$(npx semver "$CANDIDATE" -i patch)
          done

          NEW_VERSION="$CANDIDATE"
          echo "Bumping to next available version: $NEW_VERSION"

          # npm ci can rewrite package-lock.json (lockfile format upgrade), making
          # the tree dirty. Reset tracked files before npm version checks git status.
          # Build output is gitignored so this is safe.
          git checkout -- .

          npm version "$NEW_VERSION" -m "chore: bump version to %s [skip ci]" --allow-same-version

          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Version Bump
        run: |
          git push origin HEAD:master
          git push --tags
